<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Chi</title>

<!-- Icon hiện trên màn hình chính iPhone -->
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="apple-touch-icon.png">

<!-- Mở fullscreen như app thật, không có thanh trình duyệt -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Chi">

<style>
  html, body{
    margin:0; padding:0;
    height:100%;
    background:#17191a;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:-apple-system, 'Segoe UI', sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{ text-align:center; padding:0 34px; max-width:400px; }
  .paw{ width:110px; height:110px; }
  h1{ color:#f1efe8; font-size:21px; margin:16px 0 6px; }
  .sub{ color:#6c6e70; font-size:13px; font-style:italic; margin:0 0 26px; }
  .steps{
    text-align:left;
    background:#212426;
    border:1px solid rgba(255,255,255,0.08);
    border-radius:16px;
    padding:16px 18px;
    margin-bottom:20px;
  }
  .step{
    display:flex; gap:12px; align-items:flex-start;
    color:#c9c7c0; font-size:14px; line-height:1.5;
  }
  .step + .step{ margin-top:12px; }
  .num{
    flex-shrink:0;
    width:22px; height:22px;
    border-radius:50%;
    background:rgba(111,216,168,0.14);
    color:#6fd8a8;
    font-size:12px; font-weight:700;
    display:flex; align-items:center; justify-content:center;
    margin-top:1px;
  }
  .btn{
    display:inline-block;
    background:transparent;
    border:1px solid rgba(255,255,255,0.15);
    color:#98999a;
    font-size:13px;
    padding:11px 22px;
    border-radius:12px;
    text-decoration:none;
  }
  .loading{ color:#6c6e70; font-size:13px; font-style:italic; margin-top:18px; }
</style>
</head>
<body>
<div class="wrap" id="installView" style="display:none;">
  <svg class="paw" viewBox="0 0 48 48" fill="none">
    <ellipse cx="24" cy="30" rx="12" ry="10" fill="#6fd8a8"/>
    <ellipse cx="10" cy="16" rx="5" ry="6" fill="#6fd8a8"/>
    <ellipse cx="22" cy="10" rx="5" ry="6.5" fill="#6fd8a8"/>
    <ellipse cx="34" cy="12" rx="5" ry="6.5" fill="#6fd8a8"/>
    <ellipse cx="42" cy="20" rx="4.5" ry="5.5" fill="#6fd8a8"/>
  </svg>
  <h1>Chi · Việc của anh Na</h1>
  <p class="sub">meo~ cài em lên màn hình chính nhé</p>
  <div class="steps">
    <div class="step"><div class="num">1</div><div>Bấm nút <b>Chia sẻ</b> của Safari (ô vuông có mũi tên đi lên)</div></div>
    <div class="step"><div class="num">2</div><div>Chọn <b>Thêm vào MH chính</b> rồi bấm <b>Thêm</b></div></div>
    <div class="step"><div class="num">3</div><div>Từ nay mở app bằng icon dấu chân mèo trên màn hình chính</div></div>
  </div>
  <a class="btn" id="enterBtn" href="#">Hoặc vào app ngay →</a>
</div>

<div class="wrap" id="loadingView" style="display:none;">
  <svg class="paw" viewBox="0 0 48 48" fill="none">
    <ellipse cx="24" cy="30" rx="12" ry="10" fill="#6fd8a8"/>
    <ellipse cx="10" cy="16" rx="5" ry="6" fill="#6fd8a8"/>
    <ellipse cx="22" cy="10" rx="5" ry="6.5" fill="#6fd8a8"/>
    <ellipse cx="34" cy="12" rx="5" ry="6.5" fill="#6fd8a8"/>
    <ellipse cx="42" cy="20" rx="4.5" ry="5.5" fill="#6fd8a8"/>
  </svg>
  <p class="loading">meo~ đang mở app cho anh...</p>
</div>

<script>
  var APP_URL = 'https://script.google.com/a/macros/tmp.vn/s/AKfycbxI8LwMRgypMp2re1-b4oCb_v2GW6NlnxazDtz4MxS4S50ooN9kCH5v33JdlId8Tccn/exec';

  // Mở từ icon màn hình chính (chế độ app) -> vào app luôn
  // Mở trong Safari -> đứng yên hiển thị hướng dẫn cài đặt
  var standalone = (window.navigator.standalone === true) ||
                   (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches);

  if (standalone) {
    document.getElementById('loadingView').style.display = 'block';
    setTimeout(function(){ window.location.replace(APP_URL); }, 400);
  } else {
    document.getElementById('installView').style.display = 'block';
    document.getElementById('enterBtn').addEventListener('click', function(e){
      e.preventDefault();
      window.location.href = APP_URL;
    });
  }
</script>
</body>
</html>
